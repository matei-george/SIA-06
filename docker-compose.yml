version: '3.8'
services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle_smartcity
    ports:
      - "1521:1521"
      - "8080:8080"
    environment:
      - ORACLE_PASSWORD=ParolaMaster2026

  postgres-db:
    image: postgres:latest
    container_name: postgres_smartcity
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=ParolaMaster2026

  mongodb:
    image: mongo:latest
    container_name: mongo_smartcity
    ports:
      - "27017:27017"
