### REST Data HTTP service
server.port=8096
server.servlet.context-path=/DSA-WEB-RESTService


### JPA Persistence Unit (SparkSQL Connection)
## Asigură-te că SparkSQL Standalone Server este pornit pe portul 10000
# Adăugăm /default la finalul URL-ului pentru a specifica baza de date
spring.datasource.url=jdbc:hive2://localhost:10000/default
spring.datasource.driver-class-name=org.apache.hive.jdbc.HiveDriver
spring.datasource.username=admin
spring.datasource.password=admin

### Hibernate Settings
# Folosim MySQLDialect deoarece este compatibil cu SparkSQL 
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# IMPORTANTE: Strategiile de denumire trebuie să fie Standard pentru a găsi coloanele cu underscore 
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

### logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.level.org.hibernate.SQL=info

# SpringBoot Security Disable 
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration